{{define "title"}}로그인{{end}}
{{define "content"}}
<div class="card auth-card">
  <h1>로그인</h1>
  <form method="POST" action="/login">
    <label>
      아이디
      <input type="text" name="username" required autofocus minlength="4" maxlength="20">
    </label>
    <label>
      비밀번호
      <input type="password" name="password" required minlength="8" maxlength="32">
    </label>
    <button type="submit" class="btn btn-primary">로그인</button>
  </form>
  <p class="muted">계정이 없으신가요? <a href="/register">회원가입</a></p>
</div>
{{end}}
